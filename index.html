<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shrimps & Peace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #0A2F2A 0%, #0B3E32 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        .app {
            max-width: 500px;
            margin: 0 auto;
            background: #FFF8E6;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-weight: 800;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #E35F2E, #D4AF37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .user-info {
            background: #1F3D33;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 11px;
            color: #D4AF37;
            font-family: monospace;
        }
        .wallet-section {
            background: #E8DFCA;
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .btn-connect {
            background: #D4AF37;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            color: #1F3D33;
            font-size: 16px;
        }
        .status-badge {
            font-size: 11px;
            background: #2A5343;
            padding: 6px 12px;
            border-radius: 20px;
            color: #FFE5B4;
            display: inline-block;
            margin-top: 12px;
        }
        .balance-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .balance-card {
            flex: 1;
            background: #1F3D33;
            border-radius: 28px;
            padding: 12px;
            text-align: center;
            color: #FFE5B4;
        }
        .balance-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #D4AF37;
        }
        .shrimps-section {
            margin: 10px 0 24px 0;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: bold;
            color: #1F3D33;
        }
        .slots-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 8px;
            scrollbar-width: thin;
        }
        .slot-card {
            min-width: 260px;
            background: #2A5343;
            border-radius: 28px;
            padding: 14px;
            color: white;
        }
        .empty-slot {
            min-width: 260px;
            background: #3A5A4A;
            border: 2px dashed #D4AF37;
            border-radius: 28px;
            padding: 18px;
            text-align: center;
            color: #FFE5B4;
        }
        .progress-bar {
            background: #4F7B66;
            border-radius: 20px;
            height: 8px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            background: #D4AF37;
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }
        .invested-text {
            font-size: 11px;
            color: #FFD966;
            margin-top: 5px;
        }
        .shrimp-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .btn-feed {
            background: #3B7A5C;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 28px;
            cursor: pointer;
            font-size: 12px;
            flex: 1;
        }
        .btn-feed:disabled {
            background: #6B8A7A;
            cursor: not-allowed;
        }
        .btn-sell {
            background: #E35F2E;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 28px;
            cursor: pointer;
            font-size: 12px;
            flex: 1;
        }
        .shop-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 16px 0;
        }
        .shop-item {
            background: #E8DFCA;
            border-radius: 28px;
            padding: 12px;
            flex: 1;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
            font-weight: bold;
        }
        .shop-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #B8B09A;
        }
        .shop-item:active { transform: scale(0.96); background: #D4CFB5; }
        .shop-item.disabled:active { transform: none; }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 16px 0;
        }
        .btn-withdraw {
            background: #E35F2E;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }
        .btn-deposit {
            background: #2A6B8F;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }
        .reserve-info {
            background: #1F3D33;
            border-radius: 28px;
            padding: 8px 12px;
            margin-top: 10px;
            font-size: 11px;
            text-align: center;
            color: #FFE5B4;
        }
        .footer-note {
            font-size: 10px;
            text-align: center;
            color: #6B8A7A;
            margin-top: 20px;
        }
        .timer-text {
            font-size: 11px;
            color: #FFD966;
            margin-top: 5px;
        }
        .ready-badge {
            background: #D4AF37;
            color: #1F3D33;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            display: inline-block;
            margin-bottom: 6px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">🦐 SHRIMPS & PEACE</div>
        <div class="user-info" id="userIdDisplay">👤 Загрузка...</div>
    </div>

    <div class="wallet-section">
        <div class="wallet-label">🔌 Axiome Connect</div>
        <button class="btn-connect" id="connectBtn">Подключить кошелёк</button>
        <div id="connectionStatus" class="status-badge">⭕ Не подключён</div>
    </div>

    <div class="balance-row">
        <div class="balance-card">
            <div>🦐 ИГРОВОЙ БАЛАНС</div>
            <div class="balance-value" id="gameBalance">0</div>
        </div>
        <div class="balance-card">
            <div>🔗 КОШЕЛЁК</div>
            <div class="balance-value" id="walletBalance">0</div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn-deposit" id="depositBtn">💎 Пополнить (+100 SHRIM)</button>
        <button class="btn-withdraw" id="withdrawBtn">💸 Вывести всё</button>
    </div>

    <div class="shrimps-section">
        <div class="section-header">
            <span>🐣 МОИ КРЕВЕТКИ</span>
            <span>← листай →</span>
        </div>
        <div class="slots-container" id="slotsContainer"></div>
    </div>

    <div class="shop-grid">
        <div class="shop-item" id="buyShrimpBtn">🦐 Новая креветка<br>1 SHRIM</div>
        <div class="shop-item" id="buySlotBtn">🐚 Новый слот<br><span id="slotPrice">10</span> SHRIM</div>
    </div>

    <div class="reserve-info">
        💰 Резерв игры: <span id="reserveBalance">0</span> SHRIM
    </div>

    <div class="footer-note">
        🧘 1 нажатие = -1 SHRIM<br>
        📈 60 нажатий = +1 уровень → дзен 24ч<br>
        🎁 5 уровень → +30 SHRIM<br>
        💰 Продажа → +330 SHRIM
    </div>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ ==========
    const CONFIG = {
        clicksPerLevel: 60,
        maxLevel: 5,
        bonusReward: 30,
        maxSlots: 5,
        zenSeconds: 24 * 60 * 60
    };
    
    // ========== AXIOME CONNECT API ==========
    const IDX_API = "https://api-idx.axiomechain.pro";
    const CHAIN_API = "https://api-chain.axiomechain.org";
    const SHRIM_CONTRACT = "axm13falgv7wf8v3pqcwhr7suvm8e8j0hu03fjmtwrh2vek2589tdazq5p0atj";
    const GAME_WALLET = "axm1x3uspfu07sgd26jyvexe7fkjekpynx3xt8n3ca";
    
    let userAddress = null;
    let sessionToken = null;
    let pollingInterval = null;
    let gameBalance = 0;        // баланс в игре (тратится без подписей)
    let walletBalance = 0;       // баланс на реальном кошельке
    let shrimps = [];
    let slots = 1;
    let timerInterval = null;
    
    // ========== ОБЩИЙ РЕЗЕРВ ==========
    const RESERVE_KEY = 'shrimps_global_reserve';
    
    function getGlobalReserve() {
        const saved = localStorage.getItem(RESERVE_KEY);
        return saved !== null ? parseFloat(saved) : 10000;
    }
    
    function setGlobalReserve(value) {
        localStorage.setItem(RESERVE_KEY, value.toString());
        const reserveElement = document.getElementById('reserveBalance');
        if (reserveElement) reserveElement.innerText = value.toFixed(4);
    }
    
    function addToGlobalReserve(amount) {
        setGlobalReserve(getGlobalReserve() + amount);
    }
    
    function subtractFromGlobalReserve(amount) {
        const current = getGlobalReserve();
        if (current < amount) return false;
        setGlobalReserve(current - amount);
        return true;
    }
    
    // ========== AXIOME CONNECT ==========
    async function createSession() {
        try {
            const response = await fetch(`${IDX_API}/connect/create_token`, { method: 'GET' });
            const data = await response.json();
            sessionToken = data.token;
            return sessionToken;
        } catch (error) {
            console.error('Ошибка создания сессии:', error);
            return null;
        }
    }
    
    function openAxiomeWallet() {
        if (!sessionToken) return;
        window.location.href = `axiome://connect?token=${sessionToken}`;
        setTimeout(() => {
            alert('Если кошелёк не открылся, установите Axiome Wallet');
        }, 1000);
    }
    
    async function checkConnectionStatus() {
        if (!sessionToken) return null;
        try {
            const response = await fetch(`${IDX_API}/connect/get_token_info`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: sessionToken })
            });
            const data = await response.json();
            if (data.status === 'connected') {
                userAddress = data.account;
                stopPolling();
                await onWalletConnected();
                return userAddress;
            }
            return null;
        } catch (error) {
            return null;
        }
    }
    
    function startPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(async () => {
            await checkConnectionStatus();
        }, 2000);
    }
    
    function stopPolling() {
        if (pollingInterval) {
            clearInterval(pollingInterval);
            pollingInterval = null;
        }
    }
    
    async function getSHRIMBalance(address) {
        try {
            const query = { balance: { address: address } };
            const base64Query = btoa(JSON.stringify(query));
            const response = await fetch(`${CHAIN_API}/cosmwasm/wasm/v1/contract/${SHRIM_CONTRACT}/smart/${base64Query}`);
            const data = await response.json();
            return parseInt(data.data?.balance || '0') / 1_000_000;
        } catch(e) {
            return 0;
        }
    }
    
    async function transferToGame(amount) {
        // Здесь будет реальная транзакция
        alert(`💸 Перевод ${amount} SHRIM в игру...\nПодтвердите в кошельке`);
        // Имитация успешного перевода
        if (walletBalance >= amount) {
            walletBalance -= amount;
            gameBalance += amount;
            saveGame();
            updateUI();
            alert(`+${amount} SHRIM на игровой счёт`);
        } else {
            alert("Недостаточно средств на кошельке");
        }
    }
    
    async function withdrawFromGame() {
        if (gameBalance <= 0) {
            alert("Нет средств на игровом счете");
            return;
        }
        alert(`💸 Вывод ${gameBalance.toFixed(4)} SHRIM на кошелёк...\nПодтвердите в кошельке`);
        walletBalance += gameBalance;
        gameBalance = 0;
        saveGame();
        updateUI();
        alert("Средства выведены на кошелёк");
    }
    
    async function onWalletConnected() {
        document.getElementById('connectionStatus').innerHTML = "🟢 Кошелёк подключён";
        document.getElementById('connectionStatus').style.background = "#1F8A4C";
        document.getElementById('connectBtn').innerHTML = "✅ Подключён";
        document.getElementById('connectBtn').disabled = true;
        
        walletBalance = await getSHRIMBalance(userAddress);
        loadGame();
        updateUI();
    }
    
    async function connectWallet() {
        const token = await createSession();
        if (!token) {
            alert('Ошибка подключения');
            return;
        }
        openAxiomeWallet();
        startPolling();
        alert('Открывается Axiome Wallet...\nПодтвердите подключение');
    }
    
    // ========== ПОЛУЧЕНИЕ ID ПОЛЬЗОВАТЕЛЯ ==========
    function getUserId() {
        if (userAddress) return userAddress;
        let userId = localStorage.getItem('shrimps_user_id');
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            localStorage.setItem('shrimps_user_id', userId);
        }
        return userId;
    }
    
    let userId = null;
    
    // ========== СОХРАНЕНИЕ ==========
    function saveGame() {
        if (!userId) return;
        const gameData = {
            gameBalance: gameBalance,
            shrimps: shrimps,
            slots: slots
        };
        localStorage.setItem(`shrimps_game_${userId}`, JSON.stringify(gameData));
    }
    
    function loadGame() {
        if (!userId) return;
        const saved = localStorage.getItem(`shrimps_game_${userId}`);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                gameBalance = data.gameBalance ?? 100;
                shrimps = data.shrimps ?? [];
                slots = data.slots ?? 1;
                const now = Math.floor(Date.now() / 1000);
                for (const s of shrimps) {
                    if (s.zenUntil && s.zenUntil < now) s.zenUntil = null;
                    if (s.invested === undefined) s.invested = (s.level - 1) * CONFIG.clicksPerLevel + (s.clicks || 0);
                }
            } catch(e) { resetGame(); }
        } else { resetGame(); }
        updateUI();
    }
    
    function resetGame() {
        gameBalance = 100;
        shrimps = [];
        slots = 1;
        saveGame();
    }
    
    // ========== ИГРОВЫЕ МЕХАНИКИ (тратят gameBalance) ==========
    function feedShrimp(index) {
        const shrimp = shrimps[index];
        if (!shrimp) return;
        if (shrimp.completed) { alert("Готова к продаже"); return; }
        if (shrimp.level >= CONFIG.maxLevel) { alert("Макс. уровень"); return; }
        
        const now = Math.floor(Date.now() / 1000);
        if (shrimp.zenUntil && shrimp.zenUntil > now) {
            alert(`Дзен: ${Math.ceil((shrimp.zenUntil - now) / 3600)}ч`);
            return;
        }
        if (gameBalance < 1) { alert("Не хватает SHRIM на игровом счете"); return; }
        
        gameBalance -= 1;
        addToGlobalReserve(1);
        shrimp.clicks = (shrimp.clicks || 0) + 1;
        shrimp.invested = (shrimp.level - 1) * CONFIG.clicksPerLevel + (shrimp.clicks || 0);
        
        if (shrimp.clicks >= CONFIG.clicksPerLevel) {
            shrimp.level++;
            shrimp.clicks = 0;
            shrimp.zenUntil = now + CONFIG.zenSeconds;
            if (shrimp.level >= CONFIG.maxLevel) {
                shrimp.completed = true;
                if (subtractFromGlobalReserve(CONFIG.bonusReward)) {
                    gameBalance += CONFIG.bonusReward;
                    alert(`+${CONFIG.bonusReward} SHRIM`);
                }
            }
        }
        saveGame();
        updateUI();
    }
    
    function buyShrimp() {
        if (shrimps.length >= slots) { alert("Нет свободных слотов"); return; }
        if (gameBalance < 1) { alert("Нужен 1 SHRIM на игровом счете"); return; }
        gameBalance -= 1;
        addToGlobalReserve(1);
        shrimps.push({ level: 1, clicks: 0, completed: false, zenUntil: null, invested: 0 });
        saveGame();
        updateUI();
        alert("-1 SHRIM");
    }
    
    function buySlot() {
        if (slots >= CONFIG.maxSlots) { alert("Все слоты куплены"); return; }
        const price = 10 + (slots - 1) * 10;
        if (gameBalance < price) { alert(`Нужно ${price} SHRIM на игровом счете`); return; }
        gameBalance -= price;
        addToGlobalReserve(price);
        slots++;
        saveGame();
        updateUI();
        alert(`-${price} SHRIM`);
    }
    
    function sellShrimp(index) {
        const shrimp = shrimps[index];
        if (!shrimp) return;
        if (!shrimp.completed && shrimp.level < CONFIG.maxLevel) { alert("Креветка ещё не готова"); return; }
        const reward = shrimp.invested + CONFIG.bonusReward;
        if (!subtractFromGlobalReserve(reward)) { alert("В резерве недостаточно средств"); return; }
        gameBalance += reward;
        shrimps.splice(index, 1);
        saveGame();
        updateUI();
        alert(`+${reward} SHRIM`);
    }
    
    function deposit() {
        if (!userAddress) {
            alert("Сначала подключите кошелёк");
            return;
        }
        transferToGame(100);
    }
    
    function withdraw() {
        if (!userAddress) {
            alert("Сначала подключите кошелёк");
            return;
        }
        if (gameBalance <= 0) {
            alert("Нет средств на игровом счете");
            return;
        }
        withdrawFromGame();
    }
    
    // ========== ОБНОВЛЕНИЕ UI ==========
    function updateUI() {
        if (!userId) return;
        document.getElementById('userIdDisplay').innerHTML = `👤 ${userId.slice(-12)}`;
        document.getElementById('gameBalance').innerText = gameBalance.toFixed(4);
        document.getElementById('walletBalance').innerText = walletBalance.toFixed(4);
        document.getElementById('reserveBalance').innerText = getGlobalReserve().toFixed(4);
        
        const nextSlotPrice = 10 + (slots - 1) * 10;
        const slotPriceSpan = document.getElementById('slotPrice');
        if (slotPriceSpan) slotPriceSpan.innerText = nextSlotPrice;
        
        const buySlotBtn = document.getElementById('buySlotBtn');
        if (slots >= CONFIG.maxSlots) {
            buySlotBtn.classList.add('hidden');
        } else {
            buySlotBtn.classList.remove('hidden');
            buySlotBtn.classList.toggle('disabled', gameBalance < nextSlotPrice);
        }
        
        const buyShrimpBtn = document.getElementById('buyShrimpBtn');
        buyShrimpBtn.classList.toggle('disabled', shrimps.length >= slots || gameBalance < 1);
        
        const container = document.getElementById('slotsContainer');
        container.innerHTML = '';
        
        for (let i = 0; i < slots; i++) {
            const shrimp = shrimps[i];
            if (!shrimp) {
                container.innerHTML += `<div class="empty-slot">🐚 Слот ${i+1}<br>свободен<br><small>Купите креветку за 1 SHRIM</small></div>`;
            } else {
                const nowSec = Math.floor(Date.now() / 1000);
                const isZen = shrimp.zenUntil && shrimp.zenUntil > nowSec;
                let zenTimerText = "";
                if (isZen && !shrimp.completed && shrimp.level < CONFIG.maxLevel) {
                    const remaining = shrimp.zenUntil - nowSec;
                    zenTimerText = `<div class="timer-text">🧘 Дзен: ${Math.floor(remaining/3600)}ч</div>`;
                }
                const percent = ((shrimp.level - 1) * CONFIG.clicksPerLevel + (shrimp.clicks || 0)) / (CONFIG.maxLevel * CONFIG.clicksPerLevel) * 100;
                const neededClicks = CONFIG.clicksPerLevel - (shrimp.clicks || 0);
                const feedDisabled = (shrimp.completed || shrimp.level >= CONFIG.maxLevel || isZen) ? 'disabled' : '';
                const investedAmount = shrimp.invested || ((shrimp.level - 1) * CONFIG.clicksPerLevel + (shrimp.clicks || 0));
                
                if (shrimp.completed) {
                    container.innerHTML += `
                        <div class="slot-card">
                            <div class="ready-badge">✨ ГОТОВА К ПРОДАЖЕ ✨</div>
                            🕊️ Креветка ${i+1}<br>
                            Уровень ${shrimp.level}/${CONFIG.maxLevel}<br>
                            <div class="invested-text">💰 Вложено: ${investedAmount} SHRIM</div>
                            <div class="shrimp-actions">
                                <button class="btn-sell" data-index="${i}">💰 Продать за ${investedAmount + CONFIG.bonusReward} SHRIM</button>
                            </div>
                        </div>
                    `;
                } else {
                    container.innerHTML += `
                        <div class="slot-card">
                            🦐 Креветка ${i+1}<br>
                            Уровень ${shrimp.level}/${CONFIG.maxLevel}<br>
                            <div class="invested-text">💰 Вложено: ${investedAmount} SHRIM</div>
                            ${isZen ? '🧘 В дзене' : `📊 До уровня: ${neededClicks} нажатий`}
                            ${zenTimerText}
                            <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                            <div class="shrimp-actions">
                                <button class="btn-feed" data-index="${i}" ${feedDisabled}>🍽️ Кормить</button>
                            </div>
                        </div>
                    `;
                }
            }
        }
        
        document.querySelectorAll('.btn-feed').forEach(btn => {
            btn.onclick = () => feedShrimp(parseInt(btn.dataset.index));
        });
        document.querySelectorAll('.btn-sell').forEach(btn => {
            btn.onclick = () => sellShrimp(parseInt(btn.dataset.index));
        });
    }
    
    function startTimerUpdate() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(updateUI, 1000);
    }
    
    function initTelegram() {
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    }
    
    // ========== ЗАПУСК ==========
    initTelegram();
    userId = getUserId();
    loadGame();
    startTimerUpdate();
    
    document.getElementById('connectBtn').onclick = connectWallet;
    document.getElementById('depositBtn').onclick = deposit;
    document.getElementById('withdrawBtn').onclick = withdraw;
    document.getElementById('buyShrimpBtn').onclick = buyShrimp;
    document.getElementById('buySlotBtn').onclick = buySlot;
